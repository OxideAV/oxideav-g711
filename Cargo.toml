[package]
name = "oxideav-g711"
version = "0.0.3"
edition = "2021"
rust-version = "1.80"
license = "MIT"
authors = ["Mark Karpeles"]
description = "Pure-Rust ITU-T G.711 μ-law and A-law (PSTN) codec — decoder + encoder"
repository = "https://github.com/OxideAV/oxideav-g711"
homepage = "https://github.com/OxideAV/oxideav-g711"
readme = "README.md"
keywords = ["multimedia", "audio", "g711", "telephony", "codec"]
categories = ["multimedia::encoding", "multimedia::audio"]

[dependencies]
oxideav-core = "0.1"
oxideav-codec = "0.1"