[package]
name = "oxideav-g711"
version = "0.0.5"
edition = "2021"
rust-version = "1.80"
license = "MIT"
authors = ["Mark Karpeles"]
description = "Pure-Rust ITU-T G.711 μ-law and A-law (PSTN) codec — decoder + encoder"
repository = "https://github.com/OxideAV/oxideav-g711"
homepage = "https://github.com/OxideAV/oxideav-g711"
readme = "README.md"
keywords = ["multimedia", "audio", "g711", "telephony", "codec"]
categories = ["multimedia::encoding", "multimedia::audio"]

[dependencies]
oxideav-core = "0.1"
# Distributed-slice auto-registration into `oxideav_core::REGISTRARS`
# via the `oxideav_core::register!` macro. Tiny crate, no transitive
# deps; works on every target including wasm.
linkme = "0.3"
